<svg width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="3" fill="#FDB913" opacity="0.3"/>
      <circle cx="75" cy="75" r="3" fill="#FDB913" opacity="0.3"/>
    </pattern>
    <pattern id="circles" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="100" cy="100" r="80" fill="none" stroke="#FDB913" stroke-width="2" opacity="0.2"/>
    </pattern>
  </defs>

  <rect width="1000" height="1000" fill="url(#dots)"/>
  <rect width="1000" height="1000" fill="url(#circles)"/>

  <!-- Geometric shapes -->
  <path d="M 200 200 L 400 100 L 600 200 L 500 400 Z" fill="none" stroke="#FDB913" stroke-width="3" opacity="0.15"/>
  <path d="M 700 300 L 900 400 L 800 600 L 600 500 Z" fill="none" stroke="#FDB913" stroke-width="3" opacity="0.15"/>
</svg>

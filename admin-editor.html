<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFCM - Editor de Conteúdo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        h1 {
            color: #1a5490;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #1a5490;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            background: #144070;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #1a5490;
        }

        .section h2 {
            color: #1a5490;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #1a5490;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .status {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .nav-buttons {
                width: 100%;
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-edit"></i>
                Editor de Conteúdo
            </h1>
            <div class="nav-buttons">
                <a href="/admin.html" class="btn btn-secondary">
                    <i class="fas fa-cog"></i> Configurações
                </a>
                <a href="/admin/noticias.html" class="btn btn-secondary">
                    <i class="fas fa-newspaper"></i> Notícias
                </a>
            </div>
        </div>

        <div id="status" class="status"></div>

        <!-- Seção Hero -->
        <div class="section">
            <h2><i class="fas fa-home"></i> Seção Principal (Hero)</h2>

            <div class="form-group">
                <label>Título Principal (Linha 1)</label>
                <input type="text" id="hero_titulo1" placeholder="TRANSFORMANDO VIDAS,">
                <div class="help-text">Primeira linha do título</div>
            </div>

            <div class="form-group">
                <label>Título Principal (Linha 2)</label>
                <input type="text" id="hero_titulo2" placeholder="CONSTRUINDO">
                <div class="help-text">Segunda linha do título (com destaque)</div>
            </div>

            <div class="form-group">
                <label>Título Principal (Linha 3)</label>
                <input type="text" id="hero_titulo3" placeholder="O FUTURO.">
                <div class="help-text">Terceira linha do título</div>
            </div>

            <div class="form-group">
                <label>Descrição</label>
                <textarea id="hero_descricao" rows="3">Há mais de 40 anos, a CAFCM promove educação, qualificação profissional e inclusão social para jovens e adolescentes, preparando para o mundo do trabalho e para a vida.</textarea>
            </div>
        </div>

        <!-- Seção Institucional -->
        <div class="section">
            <h2><i class="fas fa-landmark"></i> Seção Institucional</h2>

            <div class="form-group">
                <label>Título</label>
                <input type="text" id="inst_titulo" placeholder="QUEM SOMOS">
            </div>

            <div class="form-group">
                <label>Subtítulo</label>
                <input type="text" id="inst_subtitulo" placeholder="Mais de 40 anos transformando vidas">
            </div>

            <div class="form-group">
                <label>Descrição</label>
                <textarea id="inst_descricao" rows="5">A CAFCM é uma instituição sem fins lucrativos que há mais de 40 anos promove a formação profissional e o desenvolvimento pessoal de jovens e adolescentes...</textarea>
            </div>
        </div>

        <!-- Botões de Ação -->
        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            <button class="btn btn-success" onclick="salvarConteudo()">
                <i class="fas fa-save"></i>
                Salvar Alterações
            </button>
            <button class="btn btn-secondary" onclick="carregarConteudo()">
                <i class="fas fa-sync"></i>
                Recarregar
            </button>
        </div>
    </div>

    <script>
        // Carrega conteúdo ao abrir a página
        window.addEventListener('DOMContentLoaded', carregarConteudo);

        async function carregarConteudo() {
            mostrarStatus('Carregando conteúdo...', 'warning');

            try {
                const response = await fetch('/api/content');

                if (!response.ok) {
                    throw new Error('Erro ao carregar conteúdo');
                }

                const content = await response.json();

                // Preenche os campos com conteúdo salvo ou padrão
                document.getElementById('hero_titulo1').value = content.hero_titulo1 || 'TRANSFORMANDO VIDAS,';
                document.getElementById('hero_titulo2').value = content.hero_titulo2 || 'CONSTRUINDO';
                document.getElementById('hero_titulo3').value = content.hero_titulo3 || 'O FUTURO.';
                document.getElementById('hero_descricao').value = content.hero_descricao || 'Há mais de 40 anos, a CAFCM promove educação, qualificação profissional e inclusão social para jovens e adolescentes, preparando para o mundo do trabalho e para a vida.';

                document.getElementById('inst_titulo').value = content.inst_titulo || 'QUEM SOMOS';
                document.getElementById('inst_subtitulo').value = content.inst_subtitulo || 'Mais de 40 anos transformando vidas';
                document.getElementById('inst_descricao').value = content.inst_descricao || '';

                mostrarStatus('✅ Conteúdo carregado com sucesso!', 'success');
                setTimeout(() => esconderStatus(), 3000);

            } catch (error) {
                console.error('Erro:', error);
                mostrarStatus('⚠️ Usando conteúdo padrão (ainda não há conteúdo salvo)', 'warning');
                setTimeout(() => esconderStatus(), 5000);
            }
        }

        async function salvarConteudo() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

            mostrarStatus('Salvando conteúdo...', 'warning');

            try {
                const content = {
                    hero_titulo1: document.getElementById('hero_titulo1').value,
                    hero_titulo2: document.getElementById('hero_titulo2').value,
                    hero_titulo3: document.getElementById('hero_titulo3').value,
                    hero_descricao: document.getElementById('hero_descricao').value,
                    inst_titulo: document.getElementById('inst_titulo').value,
                    inst_subtitulo: document.getElementById('inst_subtitulo').value,
                    inst_descricao: document.getElementById('inst_descricao').value
                };

                const response = await fetch('/api/content', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(content)
                });

                if (!response.ok) {
                    throw new Error('Erro ao salvar conteúdo');
                }

                mostrarStatus('✅ Conteúdo salvo com sucesso! As mudanças já estão ativas no site.', 'success');

            } catch (error) {
                console.error('Erro:', error);
                mostrarStatus('❌ Erro ao salvar conteúdo. Verifique se o KV está configurado.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Salvar Alterações';
            }
        }

        function mostrarStatus(mensagem, tipo) {
            const status = document.getElementById('status');
            status.textContent = mensagem;
            status.className = `status ${tipo}`;
            status.style.display = 'block';
        }

        function esconderStatus() {
            const status = document.getElementById('status');
            status.style.display = 'none';
        }
    </script>
</body>
</html>

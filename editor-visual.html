<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFCM - Modo Edição</title>
    <link rel="stylesheet" href="styles.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Barra superior de edição */
        .edit-toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            z-index: 10000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .edit-toolbar h1 {
            font-size: 18px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .edit-toolbar-buttons {
            display: flex;
            gap: 10px;
        }

        .edit-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .edit-btn:hover {
            background: white;
            color: #667eea;
        }

        .edit-btn-success {
            background: #28a745;
            border-color: #28a745;
        }

        .edit-btn-success:hover {
            background: #218838;
            border-color: #218838;
            color: white;
        }

        /* Ajusta body para compensar toolbar */
        body {
            padding-top: 70px !important;
        }

        /* Elementos editáveis */
        [data-editable] {
            outline: 2px dashed #667eea !important;
            outline-offset: 4px;
            padding: 8px;
            transition: all 0.3s;
            position: relative;
            cursor: text;
            min-height: 30px;
        }

        [data-editable]:hover {
            outline-color: #764ba2 !important;
            background: rgba(102, 126, 234, 0.05) !important;
        }

        [data-editable]:focus {
            outline: 3px solid #667eea !important;
            background: rgba(102, 126, 234, 0.1) !important;
        }

        [data-editable]::before {
            content: "✏️ Clique para editar";
            position: absolute;
            top: -25px;
            left: 0;
            background: #667eea;
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
        }

        [data-editable]:hover::before {
            opacity: 1;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #28a745;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 10001;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s;
        }

        .toast.show {
            display: flex;
        }

        .toast.error {
            background: #dc3545;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Edição de imagem */
        .image-edit-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        [data-editable-image] {
            position: relative;
            outline: 2px dashed #667eea !important;
            outline-offset: 4px;
            cursor: pointer;
        }

        [data-editable-image]:hover .image-edit-overlay {
            display: flex;
        }

        @media (max-width: 768px) {
            .edit-toolbar {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }

            .edit-toolbar h1 {
                font-size: 16px;
            }

            .edit-toolbar-buttons {
                width: 100%;
            }

            .edit-btn {
                flex: 1;
                justify-content: center;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Barra de Edição -->
    <div class="edit-toolbar">
        <h1>
            <i class="fas fa-edit"></i>
            Modo Edição - Clique nos textos para editar
        </h1>
        <div class="edit-toolbar-buttons">
            <button class="edit-btn edit-btn-success" onclick="salvarAlteracoes()">
                <i class="fas fa-save"></i>
                Salvar Alterações
            </button>
            <a href="/admin.html" class="edit-btn">
                <i class="fas fa-times"></i>
                Sair
            </a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Salvo com sucesso!</span>
    </div>

    <!-- Conteúdo da Página -->
    <div id="pageContent"></div>

    <script>
        let conteudoOriginal = {};

        async function carregarPagina() {
            try {
                const response = await fetch('/index.html');
                const html = await response.text();

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                document.getElementById('pageContent').innerHTML = doc.body.innerHTML;

                // Carrega conteúdo salvo
                await carregarConteudoSalvo();

                // Torna elementos editáveis
                setTimeout(tornarEditavel, 500);

            } catch (error) {
                console.error('Erro ao carregar página:', error);
            }
        }

        async function carregarConteudoSalvo() {
            try {
                const response = await fetch('/api/content');
                if (!response.ok) return;

                const content = await response.json();
                conteudoOriginal = content;

                // Hero Section
                if (content.hero_titulo1) {
                    const lines = [content.hero_titulo1, content.hero_titulo2, content.hero_titulo3];
                    const heroTitle = document.querySelector('.hero-content h1');
                    if (heroTitle) {
                        heroTitle.innerHTML = `
                            ${lines[0]}<br>
                            <span class="highlight">${lines[1]}</span><br>
                            ${lines[2]}
                        `;
                    }
                }

                if (content.hero_descricao) {
                    const heroDesc = document.querySelector('.hero-content p');
                    if (heroDesc) heroDesc.textContent = content.hero_descricao;
                }

                if (content.hero_imagem) {
                    const heroImg = document.querySelector('.hero-image img');
                    if (heroImg) heroImg.src = content.hero_imagem;
                }

                // Quem Somos
                if (content.quem_somos_label) {
                    const label = document.querySelector('#institucional .section-label');
                    if (label) label.textContent = content.quem_somos_label;
                }

                if (content.quem_somos_titulo) {
                    const titulo = document.querySelector('#institucional .section-title');
                    if (titulo) titulo.textContent = content.quem_somos_titulo;
                }

                if (content.quem_somos_subtitulo) {
                    const subtitulo = document.querySelector('#institucional .section-subtitle');
                    if (subtitulo) subtitulo.textContent = content.quem_somos_subtitulo;
                }

            } catch (error) {
                console.log('Nenhum conteúdo salvo ainda');
            }
        }

        function tornarEditavel() {
            // Hero Section - Título
            const heroTitle = document.querySelector('.hero-content h1');
            if (heroTitle) {
                heroTitle.contentEditable = true;
                heroTitle.setAttribute('data-editable', 'hero-titulo');
            }

            // Hero Section - Descrição
            const heroDesc = document.querySelector('.hero-content > p');
            if (heroDesc) {
                heroDesc.contentEditable = true;
                heroDesc.setAttribute('data-editable', 'hero-descricao');
            }

            // Hero Section - Imagem
            const heroImgWrapper = document.querySelector('.hero-image .image-wrapper');
            if (heroImgWrapper) {
                heroImgWrapper.setAttribute('data-editable-image', 'hero-imagem');
                heroImgWrapper.style.position = 'relative';

                const overlay = document.createElement('div');
                overlay.className = 'image-edit-overlay';
                overlay.innerHTML = '<div><i class="fas fa-image"></i> Clique para trocar imagem</div>';
                heroImgWrapper.appendChild(overlay);

                heroImgWrapper.addEventListener('click', () => {
                    const newUrl = prompt('Cole a URL da nova imagem:',
                        document.querySelector('.hero-image img')?.src || '');
                    if (newUrl) {
                        const img = document.querySelector('.hero-image img');
                        if (img) img.src = newUrl;
                    }
                });
            }

            // Seção QUEM SOMOS - Label
            const quemsomosLabel = document.querySelector('#institucional .section-label');
            if (quemsomosLabel) {
                quemsomosLabel.contentEditable = true;
                quemsomosLabel.setAttribute('data-editable', 'quem-somos-label');
            }

            // Seção QUEM SOMOS - Título
            const quemsomosTitle = document.querySelector('#institucional .section-title');
            if (quemsomosTitle) {
                quemsomosTitle.contentEditable = true;
                quemsomosTitle.setAttribute('data-editable', 'quem-somos-titulo');
            }

            // Seção QUEM SOMOS - Subtítulo
            const quemsomosSubtitle = document.querySelector('#institucional .section-subtitle');
            if (quemsomosSubtitle) {
                quemsomosSubtitle.contentEditable = true;
                quemsomosSubtitle.setAttribute('data-editable', 'quem-somos-subtitulo');
            }

            // Seção QUEM SOMOS - Conteúdo (h3 e p)
            const institucionalContent = document.querySelectorAll('.institucional-content h3, .institucional-content > p');
            institucionalContent.forEach((el, index) => {
                el.contentEditable = true;
                el.setAttribute('data-editable', `quem-somos-content-${index}`);
            });
        }

        async function salvarAlteracoes() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

            try {
                // Coleta dados editados
                const heroTitle = document.querySelector('.hero-content h1');
                const heroDesc = document.querySelector('.hero-content > p');
                const heroImg = document.querySelector('.hero-image img');

                // Extrai as 3 linhas do título Hero
                let titulo1 = '', titulo2 = '', titulo3 = '';
                if (heroTitle) {
                    const html = heroTitle.innerHTML;
                    const parts = html.split('<br>');
                    titulo1 = parts[0]?.replace(/<[^>]*>/g, '').trim() || '';
                    titulo2 = parts[1]?.replace(/<[^>]*>/g, '').trim() || '';
                    titulo3 = parts[2]?.replace(/<[^>]*>/g, '').trim() || '';
                }

                // Coleta conteúdo Quem Somos
                const quemsomosContent = {};
                document.querySelectorAll('.institucional-content h3, .institucional-content > p').forEach((el, index) => {
                    quemsomosContent[`content_${index}`] = el.innerHTML;
                });

                const content = {
                    hero_titulo1: titulo1,
                    hero_titulo2: titulo2,
                    hero_titulo3: titulo3,
                    hero_descricao: heroDesc?.textContent || '',
                    hero_imagem: heroImg?.src || '',
                    quem_somos_label: document.querySelector('#institucional .section-label')?.textContent || '',
                    quem_somos_titulo: document.querySelector('#institucional .section-title')?.textContent || '',
                    quem_somos_subtitulo: document.querySelector('#institucional .section-subtitle')?.textContent || '',
                    quem_somos_content: quemsomosContent
                };

                // Salva no KV
                const response = await fetch('/api/content', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(content)
                });

                if (!response.ok) throw new Error('Erro ao salvar');

                mostrarToast('✅ Alterações salvas com sucesso!', 'success');

            } catch (error) {
                console.error('Erro:', error);
                mostrarToast('❌ Erro ao salvar alterações. Funciona apenas online!', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Salvar Alterações';
            }
        }

        function mostrarToast(mensagem, tipo) {
            const toast = document.getElementById('toast');
            const message = document.getElementById('toastMessage');

            message.textContent = mensagem;
            toast.className = `toast ${tipo} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Carrega página ao iniciar
        window.addEventListener('DOMContentLoaded', carregarPagina);
    </script>
</body>
</html>
